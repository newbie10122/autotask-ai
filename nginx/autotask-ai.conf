server {
    listen 443 ssl http2;
    server_name autotask-ai.example.internal;

    # ssl_certificate /etc/letsencrypt/live/autotask-ai.example.internal/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/autotask-ai.example.internal/privkey.pem;

    auth_basic "CompuOne Autotask AI";
    auth_basic_user_file /etc/nginx/.htpasswd-autotask-ai;

    location /api/ {
        proxy_pass http://127.0.0.1:5110/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

